services:
  - type: web
    name: sonorita-bot
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn bot:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: TELEGRAM_BOT_TOKEN
        value: 8652318426:AAHug3Gjns1JMRDMQ9hg6VHQsMBMbKVbwDk
      - key: PORT
        value: 8080
